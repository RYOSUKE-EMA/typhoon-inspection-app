services:
  - type: web
    name: typhoon-inspection-app
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: typhoon-inspection-db
          property: connectionString

databases:
  - name: typhoon-inspection-db
    plan: free
