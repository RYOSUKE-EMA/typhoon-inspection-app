{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2>現場点検システム</h2>
  <p>工事現場の各種点検記録を作成・共有し、上司への報告を行うためのシステムです。</p>
</div>

<div class="menu-grid">
  {% for key, info in types.items() %}
  <a class="menu-card" href="{{ url_for('reports_list', category=key) }}">
    {% if counts[key] > 0 %}
    <span class="badge badge-pending pending-badge">確認待ち {{ counts[key] }}</span>
    {% endif %}
    <span class="icon">{{ info.icon }}</span>
    <div class="title">{{ info.label }}</div>
    <div class="desc">{{ info.desc }}</div>
  </a>
  {% endfor %}
</div>
{% endblock %}
