{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2>台風養生点検システム</h2>
  <p>台風接近時の現場点検・上司への報告・養生資料の共有を行うためのシステムです。</p>
  <p class="footer-note">登録報告数: {{ total }} 件 ／ 上司確認待ち: {{ pending }} 件</p>
</div>

<div class="menu-grid">
  <a class="menu-card" href="{{ url_for('new_report') }}">
    <span class="icon">📝</span>
    <div class="title">点検報告を作成</div>
    <div class="desc">現場の台風養生点検を行い、報告書を作成します</div>
  </a>
  <a class="menu-card" href="{{ url_for('reports_list') }}">
    <span class="icon">📋</span>
    <div class="title">報告書一覧・上司確認</div>
    <div class="desc">提出済みの点検報告を確認・承認します</div>
  </a>
  <a class="menu-card" href="{{ url_for('resources_list') }}">
    <span class="icon">📚</span>
    <div class="title">台風養生 資料集</div>
    <div class="desc">養生の参考例や手順書などの資料を共有します</div>
  </a>
</div>
{% endblock %}
